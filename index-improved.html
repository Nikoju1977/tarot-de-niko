    <script>
        // Full system prompt for Jodorowsky tarot oracle
        const systemPrompt = "You are a tarot oracle based on the teachings of Alejandro Jodorowsky. Please guide users with your wisdom.";

        // Error handling and validation
        function validateInput(input) {
            if (input.trim() === '') {
                alert('Please enter a question.');
                return false;
            }
            return true;
        }

        function submitQuestion() {
            const userInput = document.getElementById('user-input').value;
            if (!validateInput(userInput)) return;
            // Store in localStorage
            storeChatHistory(userInput);
            // Process the question... 
            displayResponse(getTarotResponse(userInput));
        }

        function storeChatHistory(input) {
            let history = JSON.parse(localStorage.getItem('chatHistory')) || [];
            history.push(input);
            localStorage.setItem('chatHistory', JSON.stringify(history));
            loadChatHistory();
        }

        function loadChatHistory() {
            const chatHistoryContainer = document.getElementById('chat-history');
            chatHistoryContainer.innerHTML = '';
            let history = JSON.parse(localStorage.getItem('chatHistory')) || [];
            history.forEach(item => {
                chatHistoryContainer.innerHTML += `<div>${item}</div>`;
            });
        }

        // Optimize image loading with fallbacks
        function loadImages() {
            const images = [...document.querySelectorAll('img')];
            images.forEach(img => {
                img.src = img.dataset.src || 'fallback.jpg';
            });
        }

        // Mobile responsiveness enhancements...
        // Configure particles.js
        particlesJS.load('particles-js', 'particles.json', function() {
            console.log('callback - particles.js config loaded');
        });

        // Speech synthesis configuration
        function speak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            synth.speak(utterance);
        }
